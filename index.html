<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Alexander Volzhanin · Student</title>
    <!-- Font Awesome 6 (free icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts: Inter (clean, modern) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0c0c0c;  /* deep dark */
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 1.5rem;
            color: #eaeaea;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        .card {
            max-width: 460px;
            width: 100%;
            background: #151515;         /* subtle contrast with body */
            border-radius: 2.5rem;
            padding: 2.5rem 2rem 2.2rem;
            box-shadow: 0 25px 40px -12px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(255, 255, 255, 0.02) inset;
            backdrop-filter: blur(2px);
            transition: transform 0.25s ease;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .card:hover {
            transform: scale(1.005);
            box-shadow: 0 30px 50px -15px #000000cc, 0 0 0 1px rgba(255, 255, 255, 0.04) inset;
        }

        /* profile image — minimalist round */
        .avatar-frame {
            display: flex;
            justify-content: center;
            margin-bottom: 1.2rem;
        }

        .avatar {
            width: 140px;
            height: 140px;
            object-fit: cover;
            border-radius: 50%;
            border: 2px solid #2e2e2e;
            padding: 3px;
            background: #1e1e1e;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.5);
            transition: border 0.2s;
        }

        .avatar:hover {
            border-color: #4a4a4a;
        }

        /* name & title */
        h1 {
            font-weight: 550;
            font-size: 2.3rem;
            letter-spacing: -0.02em;
            margin-bottom: 0.2rem;
            color: #ffffff;
            line-height: 1.2;
        }

        .subtitle {
            font-size: 1.1rem;
            font-weight: 380;
            color: #b0b0b0;
            margin-bottom: 2rem;
            letter-spacing: 0.3px;
            border-bottom: 1px solid #2a2a2a;
            display: inline-block;
            padding-bottom: 0.6rem;
        }

        /* links grid — minimal buttons */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 0.7rem;
            margin-top: 0.25rem;
        }

        .link-item {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 1rem;
            background: #1e1e1e;
            padding: 0.9rem 1.6rem;
            border-radius: 60px;
            text-decoration: none;
            color: #ececec;
            font-weight: 440;
            font-size: 1.05rem;
            border: 1px solid #2c2c2c;
            transition: all 0.2s cubic-bezier(0.23, 1, 0.32, 1);
            backdrop-filter: blur(4px);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        .link-item i {
            font-size: 1.5rem;
            width: 1.8rem;
            text-align: center;
            color: #d4d4d4;
            transition: color 0.2s, transform 0.2s;
        }

        .link-item span {
            flex: 1;
            text-align: left;
            letter-spacing: 0.2px;
        }

        /* hover effects — elegant minimal */
        .link-item:hover {
            background: #292929;
            border-color: #404040;
            transform: translateY(-2px);
            box-shadow: 0 12px 18px -8px rgba(0, 0, 0, 0.6);
        }

        .link-item:hover i {
            color: #ffffff;
            transform: scale(1.05);
        }

        /* phone number specific formatting (keep it readable) */
        .phone-number {
            font-feature-settings: "tnum";
            font-weight: 450;
        }

        /* small tweak for long usernames */
        .username-mono {
            font-family: 'Inter', monospace;
            letter-spacing: 0.2px;
        }

        /* order: phone, telegram, instagram, github, tiktok — already in HTML order */
        /* extra divider / spacing */
        .note {
            margin-top: 1.8rem;
            font-size: 0.75rem;
            color: #6a6a6a;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            opacity: 0.7;
        }

        /* responsiveness */
        @media (max-width: 480px) {
            body {
                padding: 0.8rem;
                align-items: flex-start;
                padding-top: 2rem;
            }
            .card {
                padding: 2rem 1.4rem 1.8rem;
                border-radius: 2rem;
            }
            h1 {
                font-size: 2rem;
            }
            .avatar {
                width: 120px;
                height: 120px;
            }
            .link-item {
                padding: 0.8rem 1.2rem;
                font-size: 1rem;
            }
            .link-item i {
                font-size: 1.3rem;
                width: 1.5rem;
            }
        }

        /* subtle focus states for accessibility */
        .link-item:focus-visible {
            outline: 2px solid #5f9ea0;
            outline-offset: 2px;
        }

        /* make image gracefully handle missing file (shows alt text nicely) */
        .avatar {
            text-indent: -9999px;  /* only if image loads; alt text not visible but that's ok */
        }
        /* fallback for image alt — we rely on image display */
    </style>
</head>
<body>
    <div class="card">
        <!-- Profile image at the top: me2.jpg -->
        <div class="avatar-frame">
            <img src="me2.jpg" alt="Alexander Volzhanin" class="avatar">
        </div>

        <!-- Name & student title -->
        <h1>Alexander Volzhanin</h1>
        <div class="subtitle">Student</div>

        <!-- Contact & social links — exactly in requested order: Phone, Telegram, Instagram, GitHub, TikTok -->
        <div class="links-container">
            <!-- 1. PHONE -->
            <a href="tel:+79656081097" class="link-item" target="_blank" rel="noopener noreferrer">
                <i class="fas fa-phone-alt" aria-hidden="true"></i>
                <span class="phone-number">+7 965 608-10-97</span>
            </a>

            <!-- 2. TELEGRAM (@alxhmk) -->
            <a href="https://t.me/alxhmk" class="link-item" target="_blank" rel="noopener noreferrer">
                <i class="fab fa-telegram-plane" aria-hidden="true"></i>
                <span>@alxhmk</span>
            </a>

            <!-- 3. INSTAGRAM (@alxhmk) -->
            <a href="https://instagram.com/alxhmk" class="link-item" target="_blank" rel="noopener noreferrer">
                <i class="fab fa-instagram" aria-hidden="true"></i>
                <span>@alxhmk</span>
            </a>

            <!-- 4. GITHUB (@alxhmk) -->
            <a href="https://github.com/alxhmk" class="link-item" target="_blank" rel="noopener noreferrer">
                <i class="fab fa-github" aria-hidden="true"></i>
                <span>@alxhmk</span>
            </a>

            <!-- 5. TIKTOK (@alxhmk) -->
            <a href="https://tiktok.com/@alxhmk" class="link-item" target="_blank" rel="noopener noreferrer">
                <i class="fab fa-tiktok" aria-hidden="true"></i>
                <span>@alxhmk</span>
            </a>
        </div>

        <!-- subtle minimalist footer — just a tiny line, keeps it clean -->
        <div class="note">— tap to connect —</div>
    </div>

    <!-- optional: ensure all external links open safely and icons are consistent -->
</body>
</html>
